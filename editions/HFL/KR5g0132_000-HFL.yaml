body:
  text: 洞眞太上八素眞經服食日月皇華訣通四扶桑太帝當以經傳太極四眞人諮於西龜王母王母告太帝曰上皇之年所以爲學得見寳文便位登玉清者皆由宻修寳道祕靈不宣於口不形於人潜感至寂以致上眞故道貴隱寂化于无形出乎无聲自我受眞經於九空已經累億之劫未傳三人至中皇元年末乃刻北元天中録那之國靈鏡人鳥之山闍萊之岫於靈宫之中凝九玄正一之氣結而成字後聖九玄金闕帝君來見靈文便命仙都運筆寫而盟天修行道成位登金闕髙上以我輕泄天寳削我眞元之號退降遊散靈官五百年中方得復於本眞元始所以置四司五帝之宫部於神兵者正以欲撿於漏泄罰於風刀也如此可不慎㢤後學如林無一人得仙何意皆由形泄道文流放天眞道旣不降天罰潜彰進退失志獨死空山徒勞无獲痛恨何言道非勤而不告非宻而不行得見眞經當宻行求靈神眞易感計日成仙也如四極眞人備經萬戒寳道祕眞而執固靈圖神志挺㧞名刋上清録字帝簡位登四極授此將復何疑哉於是太帝以八素眞經依盟而傳焉西城王君今封一通於峨嵋之山曲房之中八素眞經玄文生於太空之内見於西龜之山玄圃之上積石之隂金堂玉室之裏八素髙玄羽章靈文鬱乎洞摽紫字煥乎瓊林神光流耀於九元金音虚朗於紫天丹霞羅廕於玉房飛霄鬱勃於凝眞紫鳳振翮靈風揚煙流芬激氣洞微入玄左運自然金童右命太虚上仙神妃侍衛太華執巾玉郎輔位四司臨軒二景停暉三晨廻精飛仙互騁流曜雲營華光交煥三燭合明文威煥赫氣布紫庭衆眞宴禮稱慶上清斯神文之至尊徳巍巍乎髙靈於是髙上玉晨太上大道君清齋上宫紫金盟天受之於九玄採黄華於東井掇日根於金門廻二景以玄注納飛精以暎顔引太虚以爲期與三光以同年極天號於髙上編紫録於玉晨總萬司於帝圖掌玉皇於上仙服八素於日月誦玉章以轉神期靈眞以自娱經萬劫而不傳此道飛空歩虚超騰上眞之妙法當傳得道有骨録應爲眞人者學仙之士百萬之夫无有一人能得見其篇目者上天金闕方諸青府及地宫皆逆刻簡於未生之前當得受於眞經爾得者便補上眞爲萬仙之宗師也元始以經傳髙上玉皇九天帝王九天丈人於空玄之中表之於西龜之山玄授於西王母太上大道君受之於九玄以傳扶桑太帝君金闕帝君受之於北元以傳上相青童君太帝以傳四極眞人玄古之道氣氣相胤眞眞相傳上相撰集以編靈文祕於九天之上大有之宫侍衛玉童玉女各七百人依科七百年中有眞人聽傳四司以五帝神兵七百人糺罰漏泄有得此經不依科而妄傳七祖充責身死九泉日精赤圎形而方景其氣有衰盛運度潜虧常以月生三日九日十七日二十一日二十五日一月五過於金門之上以金精石景水母芝英錬於日魂耀精八芒也當此之日日華流散飛根滂沱金精盈溢普天得潤也夫欲求仙當以其日採御日根靈降玉戸精充幽關體生竒光與日同年潜行其道昇到金門金門在天西關之内日月通靈之門也帝君名曰赤丹金精石景水母玉胞之經月光黄其氣方精而圎象運廻而盈度周而傾常以月五日十五日二十五日經於東井之上沐浴靈暉瑩飾精芒鮮明皇華也當此之日陽精流散黄氣内纒皇華盈溢普天納眞也夫欲求仙當以其日採黄華於東井服陽精於日魂潤流九孔之内神鎭五府之宫修行其道上昇月庭月魄在東井之内則日月通輝之戸也帝君名曰黄氣陽精藏天隱月玉胎之經也夫欲採日華飛根之道未至一日當清齋燒香取井花之水九斗露於中庭書石景九錬水母玉符置於水中西向叩齒十二通微祝曰陽明鍊精光煥紫庭八芒朗暎魂芝溢盈五廻三轉氣通太靈流芳曲注廕潤蒼生冠帶金門華根鮮明服御石景水母灌精順天運氣隨日華榮九孔納眞觧脫本形畢露水中庭一宿到明日正中時取所露水一升向日服之又叩齒二十四通仰向日祝曰陽精巳通飛華巳新皇芝流溢廕注内纏仰餐玄潤芳華來臻宫宅開張蕩洗囂塵體暎玉光面發金眞雲飛羽歩上造日門畢便仰向引日精四十五咽止以餘水沐浴通身竟還室内西向叩齒二十四通冥目思見日中五色流霞皆來下接繞一身五色流霞之中自復有紫氣大如目童者累重數十圎煥耀五色之内與五氣俱來下入兆口中便引氣四十五咽咽畢又咽液九過微祝曰日魂流光五色滂沱錬魂金門圎景峨峨靈暉吐曜受明天河玉芝盈溢蘭潤芳嗟飲我皇泉哺我飛華掇根咽實夀同靈柯形附太暉身騰飛霞千齡萬劫使不傾差畢心拜日門九過止此採日根飛華太陽之精玄古妙道行之一年面有玉澤體生金光七年靈降飛行日門日中童子與兆共言自无金名帝圖緑字青宫不得見其篇目輕泄靈文九祖充責已身謝愆三徒五苦萬劫不原右石景九錬水母玉符朱書青紙著水中兼行事之日悉朱書青紙西向服之一枚行此道慎殗穢勿食五葷令五藏清香必納眞靈也若天隂无日亦於室内行之夫欲採月皇華之道當以月臨東井之日清旦取井華之水一瓫露於中庭夜半書陽精玉胎錬仙之符置於水中東向叩齒二十四通臨水祝曰黄氣隂華陽精洞鮮沐浴九魂冠帶金晨圎明啓告玉胎錬仙華光交煥流芳淘津九陽齊化玄霞散煙元景廻靈曲暎我身飛昇上宫洞覩瓊軒畢取水一升向月服之便握固存月中五色流精皆來冠接一身五色之中又有月光黄氣大如目童累重數十在月精五色之内並從口中而入洞房帀五藏便向月吞精五十咽咽液十過又叩齒十通微祝曰黄氣流精三合凝光玄暉反正冠帶八芒錬魂東井受明飛皇金華散靈五君流芳夫人降醴潤洒十方洪芝下注六腑溢充金精九化易景反容乘虚落煙遊宴太空上造月庭與眞齊𩀱變化八道出有入無二晨同暉永保无窮畢以餘水洗浴浴訖還室東向服陽精玉胎鍊仙符又叩齒十二通微祝曰藏天包光黄氣鬱散結精凝暉八芒朗煥瀅飾黄華石景淘灌玉芝盈溢潤充霄漢普天受錬啓明晨旦駕景登空得昇帝舘長離下世超度八難與月齊暉與月同幹畢咽氣五十過止此服月華之道元始妙法行之一年面生玉澤七年靈降身彂金光九年飛行上造月郷月中童子夫人五君與已周遊自无金名帝簡録字上清不得叅聞有行此方尅得上仙輕泄靈文考延七祖身没鬼官長閉地獄萬劫不原右陽精玉胎錬仙符黄書白紙著水中兼行事之日悉黄書東向服之一枚若天隂无月亦於室内修之失一日不行事損前百日之功凡上學之士採日月飛華暮卧當叩齒三十六通握固冥目思日中紫光在左眼之上月中黄氣在右眼之上晃晃爍爍洞明頭面之境微祝曰二景流精光暎我形飛華皇芝甘香充盈上冠泥丸下布黄庭三光混合二氣交并長保朱宫反老更生年同日月萬劫齊齡畢能恒行之一年則日中司命月中五星以眞靈之暉飛皇之華降受兆身面有金容頭坐紫光九年不𧇊飛行太空上妙之道勿傳非眞凡修上道服日月皇華之法毎至太𡻕本命八節之日書日月二景飛精八素玉符於竹膜之上隨節正面清旦服之此符從九空之内明於西龜之山玄圃之上積石之隂王母受之於九玄以引飛華二景之精於是太素三元君南極上元君太虚眞人悉修此道位登髙上元皇紫扎玉虚玄靈太眞此法至妙不傳下世有得其法飛行玄虚上造日門逍遥月庭夀同二景與氣長存軽泄靈文七祖充責已身謝罪長閉鬼官竹膜虚洞上通八素玄暉之氣日月二景光所流暎故飛精明於竹膜之上也施行雌一玉檢玄母八門行簡十二上願醮禮之氣奉奏靈宇求仙之道而無此符靈不爲降氣不下臨道則逺逝萬不得仙右陽精飛景之符太𡻕之日朱書竹膜之上向太𡻕服之三年胃管通明眞暉充鎮靈降玉戸面生日光七年飛行上造日門右隂精飛景玉符太𡻕之日黄書竹膜之上向太𡻕服之三年流光下暎徹照六腑五藏通明面有玉光九年飛行上造月庭右飛華日景玉胎靈符以本命之日朱書竹膜之上向本命服之三年流精紫光洞照身形面生金容九年飛行太空上造日門右皇華石景内化靈符以本命之日青書竹膜之上向本命服之三年項生圎光玄照一里九年與月中夫人共言飛行太空上造月庭八素飛精玉符以立春之日青書竹膜之上向東北正中服之一年九孔通明三年神華内鮮九年與眞合靈飛行上清一名天曜七元七素飛精化神内符以春分之日青書竹膜之上東向正中服之一年五内神化成眞七年見形爲兆使令九年内外洞暎自見五内坐在立亡神仙飛行一名九鳯玉文六素飛精通靈玉符以立夏之日朱書竹膜之上清旦東南向服之一年日中童子見形三年與形神共言九年九空眞人授兆眞經變化八方坐在立亡飛行上清一名九天龍虎章五素飛精洞天靈符以夏至之日朱書竹膜之上清旦南向服之一年徹視十里三年自知神化九年洞覩九天拜謁九天王與靈通言飛行九天一名九靈玉文四素飛精結仙玉胎金符以立秋日黄書竹膜之上清旦西南向服之三年血髓凝化九孔受眞七年形變容如金光九年得降飛霄乘空而行上造日門一名金光玉眞三素飛精招仙上符秋分日黄書竹膜之上清旦西向服之三年五嶽仙官來到上眞形見中士菴靄若見若亡下士夢睡與仙共言九年得仙官雲軿來迎上昇月庭一名總天元録二素飛精九空石景玉符以立冬日墨書竹膜之上清旦西北向服之三年能晻中讀書目明通靈見神共言九年日月玄暉生於五蔵通身明光乗空飛行與日同年一名玄景自然金靈一素飛精黄氣乗天靈符以冬至日墨書竹膜之上清旦北向服之三年能知九天人言九年與八素同軿遊行太霄宴景玉晨一名三景玄精金暉右八素飛精二景玉文生於空洞之中明於龜山之巔玄圃之上積石之隂萬氣所宗總御諸天日月𨼆文秘於九天之上萬劫一傳有得靈文日月同年變化縱景出有入無項生紫光面發金容萬靈稽首十天司迎九年修行飛昇太空上朝金闕遊宴日月之房軽泄寳文七祖充責已身滅亡三徒五苦萬劫不原奉者慎之凡行此道至其日書符向正中方叩齒三十六通冥目存思日月二景在已身兩目之上上有紫黄二氣鬱勃如煙冠帀一身便仰引日月二光紫黄之氣五十咽咽液十過止微祝曰八靈運玄綱二景廻太空三晨同靈曜七精煥八芒錬化金門上沐浴東井中流暉翳洞野石景散上宫精灑九天外洪芝灌十方仰餐八素氣乗天採飛皇神降六胃昌反形朗金容長保日月根萬劫无休終畢服符止行此道慎殗穢若犯此禁當以眞朱一銖投水中以自澣浴然後行事此上眞秘道泄則道去宻則道存修學之士宜秘修行尅獲上仙也凡上學之士得有此法若能長齋苦行計日昇玄若有此經未能勤修思眞念靈與俗无别者故不失𨼆存下仙白日尸解及命過太隂地下主者或遺骨胎變受化南宫必宿有骨録應得此經終歸神仙故也太上大道玉晨君受九玄太空靈文日月皇華之法帝君十二上願玄毋八門行簡醮禮之氣上告九天之明晨醮氣之招神也此月華日曜之氣暎乎東井者也得行此道八素之氣自然降也日月飛根必可採也十二上願尅從願也玄母八門將刻上仙也學无此法將損神於徒勞无獲於求仙若欲施之受師口言此道微妙不行於世得者皆青宫逆注於未生之前定録於東華必爲上清眞人者也常以正月九日二月八日三月七日四月六日五月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日一年十二日沐浴清齋夜半於宻室之内逺近安定人犬不聞然後施行安八位置八方位施二尺四寸紫紋爲席以白茅爲藉位香餅棗果三柈一香火於位前八位則八香火也書八簡置八方以請九天明晨之官第一簡曰九天元始玉清紫道虚皇上道君駕一景之輿八素紫雲廻明晨之蓋下降王甲醮禮願使甲得長與玄毋俱生於生氣之間仰服八素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置西北位第二簡曰九天元始玉清翼日虚皇上道君駕二景之輿七素絳雲廻明晨之蓋下降王甲醮禮願使甲得與玄毋俱存日月之間仰服七素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置正北位第三簡曰九天元始玉清昌陽姬虚皇髙元君駕三景之輿六素紅雲廻明晨之蓋下降王甲醮禮願使某得與玄母俱保於九天之間仰服六素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置東北位第四簡曰九天元始玉清七靜導生髙上虚皇君駕四景之輿五素青雲廻明晨之盖下降王甲醮禮願使某得與玄毋俱食自然之間仰服五素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置正東位第五簡曰九天元始玉清太明虚皇洞清君駕五景之輿四素黄雲廻明晨之盖下降王甲醮禮願使某得與玄母俱飮匏河之間仰服四素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置東南位第六簡曰九天元始玉清始元虚皇太霄君駕六景之輿三素緑雲廻明晨之蓋下降王甲醮禮願使某得與玄母俱息於玉眞之間仰服三素飛精日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置正南位第七簡曰九天元始玉清七觀无生虚皇金靈君駕七景之輿二素紫雲廻明晨之蓋下降王甲醮禮願使某得與玄毋俱寢於仙堂之間仰服二素飛精日月皇華之根十二上願早得飛仙遊行太清青書竹簡上置西南位第八簡曰九天元始玉清八觀髙元虚皇淳景君駕八景之輿一素靈雲廻明晨之蓋下降王甲醮禮願使某得與玄母俱遊三玄之間仰服一素飛雲日月皇華之根十二上願早得飛仙遊行玉清青書竹簡上置正西位右玄母八門行簡以請九天明晨之氣服御八景飛精日月皇華求仙之道青筆書竹簡之上令長一尺二寸以置八位之坐示醮禮氣之招神矣於八位外北向叩齒三十六通稱某嶽先生王甲謹以吉晨清齋奉醮禮上迃神蓋廻靈曲暎降八素之氣下臨丹心咸見降位賜丐神仙次向西北再拜長跪讀第一簡竟便奉請八素希微蒼帝明晨道君下降醮位賜甲神仙得乗一景之輿八素紫雲上昇玉清朝禮九天次向正北再拜長跪讀第二簡竟奉請七素中微赤帝明晨道君下降醮位賜甲神仙得乗二景之輿七素絳雲上昇玉清朝禮九天次向東北再拜長跪讀第三簡竟奉請六素紫微白帝明晨道君下降醮位賜甲神仙得乗三景之輿六素紅雲上昇玉清朝禮九天次東向再拜長跪讀第四簡竟奉請五素玄微黒帝明晨道君下降醮位賜甲神仙得乗四景之輿五素青雲上昇玉清朝禮九天次東南向再拜長跪讀第五簡竟奉請四素始微上帝明晨道君下降醮位賜甲神仙得乗五景之輿四素黄雲上昇玉清朝禮九天次正南向再拜長跪讀第六簡竟奉請三素靈微中帝明晨道君下降醮位賜甲神仙得乗六景之輿三素緑雲上昇玉清朝禮九天次西南向再拜長跪讀第七簡竟奉請二素宣微下帝明晨道君下降醮位賜甲神仙得乗七景之輿二素紫雲上昇玉清朝禮九天次正西向再拜長跪讀第八簡竟奉請一素洞微眞帝明晨道君下降醮位賜甲神仙得乗八景之輿一素靈雲上昇玉清朝禮九天奉請八帝都竟還向北面冥目内思存見室内有八素之雲鬱鬱竟天來下滿於室内冠帀已身便叩齒三十六通仰頭引雲氣二十四咽止仍祝曰吉日有良辰八道氣澄清微霄乗運廻流霞曜紫庭素景朗太虚控轡迅緑軿飛根錬八芒皇華瑩魂精二象吐竒津流香灌太冥玄母結上願八簡奏丹誠醮禮招神饗仰迃八素雲靈降不終旦儵歘玄光傾有願朝玉宇結篇東華庭賜給八景輿素靈帶飛軿精思思玄感願不損我生畢都向北九拜止餘醮適所止唯不得妄與異人甞之爾一年十二過行之三年如此更不又施也此道至祕不行於世凡修衆經僃符咽氣而不奉醮於明晨眞不下降思不上感徒勞苦念損神䘮氣无益於求仙也有得其法但依日三年奉醮九天感恱八素歡暢神眞感降八年尅得乗輿輕舉飛行太空也上古眞人醮禮之法悉用金液瓊英世无此物可以珎果妙味亦足感於神眞也帝君開善願行八簡正以凝於神眞希降靈仙故也今五嶽諸仙及神州仙女猶酌金液而按瓊英說大願陳八簡期太素奉三元志霄晨爲玉眞㧞七祖入廣寒豈况世中之庸猥五濁之微賤者㦲當可替而不修聞而不爲者耶夫形神雖積善於生生而七世有罪而不解者已亦必无仙冀也是須大願奏八簡奉醮果希神降釋宿根兆身乃得不死必成上仙之人自无宿挺合仙刻名上宫此文不可得見也有得神篇則給玉童玉女各十二人侍衛神眞糺於漏泄有犯明禁罰以風刀七祖謝責負石摙山三徒五苦萬劫不原奉者慎之凡修八素之道行八簡之法常以立春立秋之日平旦入室向北叩齒三通仰思太素元君頭戴日圎光寳華之精身衣雲光雲文素綬始素元君頭戴月珠寳光夜精衣紫光雲衣素綬二素共乗紫綠二色之雲飛輿瓊輪十二鳳皇從上宫玉女三十六人徘徊玉清之上東北而行便八拜八叩頭八搏頰微祝曰太始二靈素氣髙明徘徊瓊輿吉日行清上迃神光下暎我形通我九元降我八精四㑹交逹五寳雲生得乘一景上昇玉庭稽首太素受仙素靈畢仰頭八咽止春分秋分之日食時入室向東叩齒三通仰思玄素元君頭戴青華歳星九氣之精衣飛雲九變素綬元素元君頭戴白光太白星素華之精衣流光飛雲素袿二素共乘玄黄二色之雲飛輪羽盖二十四鳳皇從素靈玉女三十六人徘徊玉虚之内東南而行便四拜四叩頭四搏頰微祝曰玄元二景髙尊素神化氣散靈飛騰金門紫虚策轡五靈翼軒徘徊華庭洞耀九雲上吉之日天元敷陳萬慶交會我願自然髙上流降永保素眞乘景飛空昇入玉晨稽首上玄受化髙仙畢仰咽八氣止立夏立冬之日正中入室東南向叩齒三通仰思紫素元君頭戴丹元熒星八光流精衣玄黄九色素羅之綬黄素元君頭戴玄晨辰星五色之精衣飛雲无縫素錦之綬二素共乘紫青二色之雲瓊輪玉輿九龍臣玄從上宫玉女二十四人徘徊紫虚之上東向而行便再拜再叩頭再搏頰微祝曰紫黄虚靈二素髙眞乗空落景嘯風命煙遊廻玉清洞觀紫天元慶上吉髙聖敷陳流精億億淘津千千下匝无下上普九玄賜我八景飛昇无間與日同暉與月齊年畢仰咽八氣止夏至冬至之日晡時入室向西叩齒三通仰思白素元君頭戴黄元鎭星三氣華精衣黄緑曜光雲文之裘飛素元君頭戴七曜紫元流光衣七色雲羅素袿二素共乗青虹之雲飛瓊紫盖十二飛麟從太華玉女三十二人徘徊洞清之上西南而行便六拜六叩頭六搏頰祝曰飛景八素白元結精玄氣交慶混合上清流雲二色曜眞霄庭玉皇廻轡匡絡紫瓊徘徊丹房八氣洞明廻度天元流盻我形運我雲輪降我飛軿得與八素齊景眞靈畢咽氣八過止此八素行真宴景雲京上㑹之道髙靈玉名口口相傳自无金書緑字列名玄圖不得參聞得行其法八素詣房八年自然洞朗八宫飛空乗玄遊行上清也凡受八素眞經弟子師對齋百日或三十日齎上金八兩五色繒各三十尺法衣一副以盟九天誓靈之約受八素内名䌝文二十二尺以列告寳眞之誓闕此信不得妄告八素名輕泄髙靈九祖充責受者同被風刀之考眞景髙逝徒勞爲學不降爾形傳受明慎如四極之盟焉洞眞太上八素真經服食日月皇華訣
